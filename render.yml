services:
  - type: web
    name: gestion-salaire
    env: docker
    plan: free
    envVars:
      - key: SECRET_KEY
        generateValue: true
      - key: DEBUG
        value: False
      - key: ALLOWED_HOSTS
        value: gestion-salaire.onrender.com
      - key: DATABASE_URL
        fromDatabase:
          name: gestion-salaire-db
          property: connectionString

databases:
    - name: gestion-salaire-db
      plan: free